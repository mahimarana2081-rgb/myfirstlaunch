<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
}

.scroll-container {
  width: 100%;
  overflow: hidden;
  background: #f2f2f2;
}

.scroll-content {
  display: flex;
  width: max-content;
  animation: scroll 10s linear infinite;
}

.scroll-content img {
  width: 80px;
  margin: 10px;
}

@keyframes scroll {
  0% {
    transform: translateX(0);
  }
  100% {
    transform: translateX(-50%);
  }
}
</style>
</head>

<body>

<div class="scroll-container">
  <div class="scroll-content">
    <img src="https://via.placeholder.com/80" />
    <img src="https://via.placeholder.com/80" />
    <img src="https://via.placeholder.com/80" />
    <img src="https://via.placeholder.com/80" />
    <img src="https://via.placeholder.com/80" />
  </div>
</div>

</body>
</html>
